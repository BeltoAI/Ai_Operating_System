<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1610"/><stop offset="1" stop-color="#12100c"/>
    </linearGradient>
    <clipPath id="typeClip"><rect x="516" y="196" width="0" height="22">
      <animate attributeName="width" dur="8s" repeatCount="indefinite"
        keyTimes="0;0.1;0.36;0.9;1" values="0;0;188;188;0"/>
    </rect></clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="760" height="440" rx="22" fill="url(#bg)"/>

  <!-- ── left text column (clear of the phone at x=500+) ── -->
  <text x="44" y="150" font-size="30" font-weight="700" fill="#F4EFE6">One agent.</text>
  <text x="44" y="188" font-size="30" font-weight="700" fill="#F0703A">Your whole phone.</text>
  <text x="44" y="230" font-size="14.5" fill="#C7BEB0">Answers every message in your voice —</text>
  <text x="44" y="252" font-size="14.5" fill="#C7BEB0">a memory that's quietly becoming you.</text>
  <text x="44" y="300" font-size="14" fill="#F4EFE6" font-weight="600">Runs free on Gemini</text>
  <text x="44" y="320" font-size="12.5" fill="#8C8275">~255 tokens per reply</text>
  <text x="44" y="404" font-size="12.5" fill="#8C8275">slyos.world · Android · MIT</text>

  <!-- ── phone (right) ── -->
  <g filter="url(#soft)">
    <rect x="500" y="30" width="220" height="380" rx="30" fill="#F4EFE6" stroke="#e2dacb" stroke-width="1.5"/>
    <rect x="582" y="44" width="56" height="7" rx="3.5" fill="#e2dacb"/>
  </g>
  <text x="610" y="96" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1714">Sly<tspan fill="#F0703A">OS</tspan></text>
  <text x="610" y="168" text-anchor="middle" font-size="15" fill="#9A9085">what should happen?</text>

  <!-- typed command + caret -->
  <g clip-path="url(#typeClip)">
    <text x="516" y="212" font-size="14" fill="#1A1714">text Anna I'm running late</text>
  </g>
  <rect y="197" width="2" height="20" fill="#F0703A">
    <animate attributeName="x" dur="8s" repeatCount="indefinite"
      keyTimes="0;0.1;0.36;0.9;1" values="516;516;704;704;516"/>
    <animate attributeName="opacity" dur="0.9s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1"/>
  </rect>
  <line x1="516" y1="224" x2="704" y2="224" stroke="#e2dacb" stroke-width="1.5"/>

  <!-- working… -->
  <text x="610" y="262" text-anchor="middle" font-size="13" fill="#F0703A" opacity="0">✦ working…
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.37;0.4;0.45;1" values="0;0;1;0;0"/>
  </text>

  <!-- result card 1 -->
  <g opacity="0">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.48;0.92;1" values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.5;1" values="0 10;0 10;0 0;0 0"/>
    <rect x="516" y="250" width="188" height="42" rx="11" fill="#FBF8F2" stroke="#e2dacb"/>
    <circle cx="535" cy="271" r="9" fill="#2E9E5B"/><path d="M531 271l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="552" y="268" font-size="11.5" font-weight="600" fill="#1A1714">Texted Anna</text>
    <text x="552" y="282" font-size="10.5" fill="#8C8275">“running late” · sent</text>
  </g>

  <!-- result card 2 -->
  <g opacity="0">
    <animate attributeName="opacity" dur="8s" repeatCount="indefinite" keyTimes="0;0.53;0.56;0.92;1" values="0;0;1;1;0"/>
    <animateTransform attributeName="transform" type="translate" dur="8s" repeatCount="indefinite" keyTimes="0;0.53;0.58;1" values="0 10;0 10;0 0;0 0"/>
    <rect x="516" y="300" width="188" height="42" rx="11" fill="#FBF8F2" stroke="#e2dacb"/>
    <circle cx="535" cy="321" r="9" fill="#2E9E5B"/><path d="M531 321l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="552" y="318" font-size="11.5" font-weight="600" fill="#1A1714">Reminder set</text>
    <text x="552" y="332" font-size="10.5" fill="#8C8275">nudge you in 30 min</text>
  </g>

  <!-- real bottom nav: home · messages · brain (center) · apps · me -->
  <line x1="512" y1="366" x2="708" y2="366" stroke="#ece5d8" stroke-width="1"/>
  <g fill="none" stroke="#b3aa9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(522,380) scale(0.7)"><path d="M3 11l9-8 9 8"/><path d="M5 9.5V20h5v-6h4v6h5V9.5"/></g>
    <g transform="translate(562,380) scale(0.7)"><path d="M4 5h16v11H9l-4 4V16H4z"/></g>
    <g transform="translate(642,380) scale(0.7)"><rect x="4.5" y="4.5" width="6" height="6" rx="1.4"/><rect x="13.5" y="4.5" width="6" height="6" rx="1.4"/><rect x="4.5" y="13.5" width="6" height="6" rx="1.4"/><rect x="13.5" y="13.5" width="6" height="6" rx="1.4"/></g>
    <g transform="translate(682,380) scale(0.7)"><circle cx="12" cy="8" r="3.2"/><path d="M5.5 20c0-3.6 2.9-6.5 6.5-6.5S18.5 16.4 18.5 20"/></g>
  </g>
  <circle cx="610" cy="388" r="15" fill="#F0703A"/>
  <g transform="translate(602,380) scale(0.7)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7.5" r="2.1"/><circle cx="7" cy="15" r="2.1"/><circle cx="17" cy="15" r="2.1"/><path d="M11 9L8.4 13M13 9l2.6 4M9 15h6"/></g>
</svg>
